[pytest]
# Run from python/.  The suite is hermetic — conftest.py stubs the XIVAPI
# fetch so no test touches the network (that single un-stubbed dependency
# was ~90% of the old wall-clock).
#
# Fast:      pytest
# Parallel:  pytest -n auto      (needs pytest-xdist; distributes the
#                                 simulator-bound tests across cores)
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -q
markers =
    slow: marks tests that run the idealized simulator (deselect with -m "not slow")
